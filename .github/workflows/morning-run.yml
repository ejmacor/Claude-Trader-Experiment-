name: Morning Trading Run

on:
  schedule:
    # GitHub cron is UTC. Two slots for redundancy — Actions crons are
    # best-effort and can be skipped/delayed, so we fire a primary at
    # 12:10 UTC (8:10am ET during EDT) and a backup at 12:25 UTC (8:25am ET).
    # The "Skip if already ran today" step below makes the backup a no-op
    # whenever the primary succeeded.
    # NOTE: When clocks change to EST in November, update to
    # '10 13 * * 1-5' and '25 13 * * 1-5'.
    - cron: '10 12 * * 1-5'
    - cron: '25 12 * * 1-5'
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed to commit logs back to the repo

concurrency:
  group: morning-run
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Skip if already ran today
        id: dedupe
        run: |
          python - <<'EOF'
          import json, os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          today = datetime.now(ZoneInfo("America/New_York")).date().isoformat()
          ran = False
          try:
              with open("logs/decisions.jsonl") as f:
                  for line in f:
                      try:
                          row = json.loads(line)
                      except json.JSONDecodeError:
                          continue
                      d = datetime.fromisoformat(row["timestamp"]).astimezone(
                          ZoneInfo("America/New_York")).date().isoformat()
                      if d == today:
                          ran = True
          except FileNotFoundError:
              pass
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"already_ran={'true' if ran else 'false'}\n")
          print("Already ran today:", ran)
          EOF

      - name: Skip if US market holiday
        id: holiday
        if: steps.dedupe.outputs.already_ran == 'false'
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python - <<'EOF'
          import os, requests, datetime, sys
          headers = {
              "APCA-API-KEY-ID": os.environ["ALPACA_API_KEY"],
              "APCA-API-SECRET-KEY": os.environ["ALPACA_SECRET_KEY"],
          }
          today = datetime.date.today().isoformat()
          r = requests.get(
              "https://paper-api.alpaca.markets/v2/calendar",
              headers=headers, params={"start": today, "end": today}, timeout=30)
          r.raise_for_status()
          is_open = bool(r.json())
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"market_open={'true' if is_open else 'false'}\n")
          print("Market open today:", is_open)
          EOF

      - name: Run morning pipeline
        if: steps.dedupe.outputs.already_ran == 'false' && steps.holiday.outputs.market_open == 'true'
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_morning.py

      - name: Commit logs back to repo
        if: steps.dedupe.outputs.already_ran == 'false' && steps.holiday.outputs.market_open == 'true'
        run: |
          git config user.name "claude-trader-bot"
          git config user.email "actions@github.com"
          git add logs/ || true
          git diff --cached --quiet || git commit -m "logs: morning run $(date -u +%F)"
          git push

      - name: Push notification to phone
        if: always() && steps.dedupe.outputs.already_ran == 'false' && steps.holiday.outputs.market_open == 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python - <<'EOF'
          import json, os, urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          topic = os.environ.get("NTFY_TOPIC", "").strip()
          if not topic:
              print("No NTFY_TOPIC secret set; skipping notification.")
              raise SystemExit(0)

          today = datetime.now(ZoneInfo("America/New_York")).date().isoformat()
          msg, title = "Run finished but no decision was logged (check Actions).", "Claude Trader"
          try:
              last = None
              with open("logs/decisions.jsonl") as f:
                  for line in f:
                      try:
                          row = json.loads(line)
                      except json.JSONDecodeError:
                          continue
                      d = datetime.fromisoformat(row["timestamp"]).astimezone(
                          ZoneInfo("America/New_York")).date().isoformat()
                      if d == today:
                          last = row
              if last:
                  dec = last.get("decision", {})
                  trades = dec.get("trades", [])
                  if trades:
                      title = f"Claude Trader: {len(trades)} trade(s) today"
                      lines = [f"{t['symbol']} conviction {t.get('conviction','?')}/10 ({t.get('catalyst_type','')})"
                               for t in trades]
                      msg = "\n".join(lines) + "\n\n" + dec.get("market_note", "")[:300]
                  else:
                      title = "Claude Trader: no trades today"
                      msg = dec.get("market_note", "No qualifying setups.")[:400]
          except FileNotFoundError:
              pass

          req = urllib.request.Request(
              f"https://ntfy.sh/{topic}",
              data=msg.encode("utf-8"),
              headers={"Title": title, "Tags": "chart_with_upwards_trend"},
          )
          urllib.request.urlopen(req, timeout=30)
          print("Notification sent.")
          EOF

      - name: Alert on failure
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python - <<'EOF2'
          import os, urllib.request
          topic = os.environ.get("NTFY_TOPIC", "").strip()
          if not topic:
              raise SystemExit(0)
          req = urllib.request.Request(
              f"https://ntfy.sh/{topic}",
              data=b"MORNING RUN FAILED - check GitHub Actions logs. No trades may have been placed today.",
              headers={"Title": "Claude Trader: FAILURE", "Tags": "rotating_light", "Priority": "high"})
          urllib.request.urlopen(req, timeout=30)
          EOF2
