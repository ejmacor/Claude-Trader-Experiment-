name: Evening Review

on:
  schedule:
    # 21:10 UTC = 5:10pm ET during EDT — after the close.
    # 23:10 UTC backup fires if GitHub delays/skips the first (outcomes.py
    # is idempotent, so a double run appends nothing twice).
    # NOTE: When clocks change to EST in November, shift both +1 hour.
    - cron: '10 21 * * 1-5'
    - cron: '10 23 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write   # commits outcomes back to the repo

concurrency:
  group: evening-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Record outcomes (trades taken + rejected counterfactuals)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python outcomes.py | tee outcome_summary.txt

      - name: Run review
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python review.py | tee review_summary.txt

      - name: Commit outcomes back to repo
        run: |
          git config user.name "claude-trader-bot"
          git config user.email "actions@github.com"
          git add logs/ || true
          if git diff --cached --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "logs: outcomes $(TZ=America/New_York date +%F)"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin main
          done
          git push

      - name: Push evening notification to phone
        if: always()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python - <<'EOF'
          import os, urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          topic = os.environ.get("NTFY_TOPIC", "").strip()
          if not topic:
              print("No NTFY_TOPIC secret set; skipping notification.")
              raise SystemExit(0)

          parts = []
          for fname in ("outcome_summary.txt", "review_summary.txt"):
              try:
                  with open(fname) as f:
                      parts.append(f.read().strip())
              except FileNotFoundError:
                  pass
          et_now = datetime.now(ZoneInfo("America/New_York")).strftime("%-I:%M %p ET")
          msg = ("\n\n".join(parts))[:900] or "Evening review ran; no summary produced."

          req = urllib.request.Request(
              f"https://ntfy.sh/{topic}",
              data=f"[{et_now}] {msg}".encode("utf-8"),
              headers={"Title": f"Claude Trader: evening review ({et_now})", "Tags": "moon"},
          )
          urllib.request.urlopen(req, timeout=30)
          print("Notification sent.")
          EOF
