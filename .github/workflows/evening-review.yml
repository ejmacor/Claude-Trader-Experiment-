name: Evening Review

on:
  schedule:
    # 21:10 UTC = 5:10pm ET during EDT — after the close.
    # NOTE: When clocks change to EST in November, update to '10 22 * * 1-5'.
    - cron: '10 21 * * 1-5'
  workflow_dispatch: {}

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run review
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python review.py
