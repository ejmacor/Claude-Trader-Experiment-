name: Weekly Self-Review

on:
  schedule:
    # Fridays 21:40 UTC = 5:40pm ET during EDT (after the evening review
    # has committed the week's outcomes at ~21:10).
    # Saturday 13:40 UTC backup: self_review.py is idempotent (skips if the
    # Friday-anchored file exists) and clamps the window to Mon–Fri.
    # NOTE: When clocks change to EST in November, shift the Friday cron +1h.
    - cron: '40 21 * * 5'
    - cron: '40 13 * * 6'
  workflow_dispatch: {}

permissions:
  contents: write   # commits the journal entry

concurrency:
  group: weekly-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Claude reviews its own week
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python self_review.py | tee review_out.txt

      - name: Commit journal entry
        run: |
          git config user.name "claude-trader-bot"
          git config user.email "actions@github.com"
          git add journal/ || true
          if git diff --cached --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "journal: weekly self-review $(TZ=America/New_York date +%F)"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase origin main
          done
          git push

      - name: Notify phone with the verdict
        if: always()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python - <<'EOF'
          import os, re, urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          topic = os.environ.get("NTFY_TOPIC", "").strip()
          if not topic:
              print("No NTFY_TOPIC secret set; skipping.")
              raise SystemExit(0)

          msg = "Weekly self-review posted to the dashboard journal."
          try:
              out = open("review_out.txt").read()
              m = re.search(r"SUMMARY_START\n(.*?)\nSUMMARY_END", out, re.S)
              if m:
                  msg = m.group(1).strip()[:400] + "\n\nFull review on the dashboard."
              elif "skipping review" in out:
                  msg = "Quiet week — no decisions to review."
          except FileNotFoundError:
              pass

          et_now = datetime.now(ZoneInfo("America/New_York")).strftime("%-I:%M %p ET")
          req = urllib.request.Request(
              f"https://ntfy.sh/{topic}",
              data=f"[{et_now}] {msg}".encode("utf-8"),
              headers={"Title": f"Claude Trader: weekly self-review ({et_now})", "Tags": "brain"},
          )
          urllib.request.urlopen(req, timeout=30)
          print("Notification sent.")
          EOF
